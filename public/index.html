<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="description" content="Smarterlift — AI-powered lead-gen and customer portal for Texas elevator service companies." />
    <title>Smarterlift</title>

    <!-- Favicons. SVG is preferred by modern browsers; .ico catches the
         default-request path; apple-touch-icon is for iOS Add-to-Home. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- M-8 cleanup: key sourced from REACT_APP_GOOGLE_PLACES_API_KEY (.env.local
         + Amplify env). CRA replaces %VAR% at build time. Real defense for this
         browser-side key is HTTP-referrer restrictions in GCP console. -->
    <script src="https://maps.googleapis.com/maps/api/js?key=%REACT_APP_GOOGLE_PLACES_API_KEY%&libraries=places&loading=async"></script>
</head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
